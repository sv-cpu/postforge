<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВКонтакте — Авторизация</title>
    <style>
        body {
            font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
            background: #212121;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            text-align: center;
            padding: 32px;
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #3f3f3f;
            border-top-color: #10a37f;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error { color: #ef4444; }
        .success { color: #10a37f; }
    </style>
</head>
<body>
    <div class="box">
        <div id="status">
            <div class="spinner"></div>
            <p>Авторизация ВКонтакте...</p>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const error = params.get('error');

        const status = document.getElementById('status');

        if (error) {
            status.innerHTML = `<p class="error">Ошибка: ${error}</p>`;
        } else if (!code) {
            status.innerHTML = `<p class="error">Код авторизации не получен</p>`;
        } else {
            fetch('/api/vk/callback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code }),
            })
            .then(resp => resp.json())
            .then(data => {
                if (data.ok) {
                    status.innerHTML = `<p class="success">✅ ВК подключен! Окно закроется...</p>`;
                    setTimeout(() => window.close(), 2000);
                } else {
                    status.innerHTML = `<p class="error">Ошибка: ${data.error || 'неизвестно'}</p>`;
                }
            })
            .catch(() => {
                status.innerHTML = `<p class="error">Ошибка соединения с сервером</p>`;
            });
        }
    </script>
</body>
</html>
