<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostForge — Генератор постов</title>
    <link rel="stylesheet" href="/static/css/main.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">PostForge</div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item {% if request.url.path == '/' %}active{% endif %}">
                    <span class="nav-icon">&#9889;</span>
                    Генератор
                </a>
                <a href="/archive" class="nav-item {% if request.url.path == '/archive' %}active{% endif %}">
                    <span class="nav-icon">&#128451;</span>
                    Архив
                </a>
                <a href="/settings" class="nav-item {% if request.url.path == '/settings' %}active{% endif %}">
                    <span class="nav-icon">&#9881;</span>
                    Настройки
                </a>
            </nav>
        </aside>
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
    <script src="/static/js/main.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
